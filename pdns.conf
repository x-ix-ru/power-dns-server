# PowerDNS Authoritative Server configuration

#################################
# Backends
#################################
launch=gsqlite3

#################################
# SQLite3 backend settings
#################################
gsqlite3-database=/var/lib/powerdns/pdns.db

#################################
# Network
#################################
local-address=0.0.0.0
local-port=53

#################################
# API / Webserver
#################################
api=yes
api-key=secret
webserver-address=0.0.0.0
webserver-port=80
webserver-allow-from=0.0.0.0/0,::/0

#################################
# Daemon mode
#################################
daemon=no
write-pid=no

#################################
# Security
#################################
setuid=pdns
setgid=pdns

#################################
# Logging
#################################
loglevel=4
disable-syslog=no
log-timestamp=yes

#################################
# General
#################################
default-soa-content=nameserver namemaster@nameserver 0 10800 600 604800 120
default-ttl=600
version-string=full
